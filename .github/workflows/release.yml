name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.0）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build hit-cli (release)
        run: cargo build --release -p hit-cli

      - name: Build hit-shim (release)
        run: cargo build --release -p hit-shim

      - name: Run tests
        run: cargo test --workspace

      - name: Package artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $arch = "x86_64"
          $zipName = "hit-$arch-pc-windows-msvc-$version.zip"
          Compress-Archive -Path @(
            "target/release/hit.exe",
            "target/release/hit-shim.exe",
            "LICENSE",
            "README.md"
          ) -DestinationPath $zipName
          echo "ARTIFACT=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
          body: |
            ## Hit ${{ github.ref_name }}

            ### 安装方式

            ```powershell
            irm https://get.hit.sh | iex
            ```

            ### 从本地安装

            ```powershell
            .\scripts\install-hit.ps1 -FromLocal .\hit.exe
            ```
